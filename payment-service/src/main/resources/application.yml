server:
  port: 8081

spring:
  profiles:
    active: mock
  
  sql:
    init:
      mode: always

  datasource:
    url: jdbc:h2:mem:payments-db
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true


  h2:
    console:
      enabled: true
      path: /h2-console
