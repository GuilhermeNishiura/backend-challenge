server:
  port: 8081

spring:
  sql:
    init:
      mode: always

  datasource:
    url: jdbc:h2:mem:payments-db
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
  
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: my-secret-key

  kafka:
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false
  
  activemq:
    user: admin
    password: admin


payment:
  queue:
    notification: payment.notifications


springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true